plugins {
    id 'com.android.application'
}

android {
    namespace 'com.snap.rhi.demo'
    compileSdk 35
    ndkVersion "28.0.13004108"

    defaultConfig {
        applicationId 'com.snap.rhi.demo'
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "1.0.0"

        ndk {
            abiFilters 'arm64-v8a'
        }

        externalNativeBuild {
            cmake {
                // Common CMake arguments shared by all flavors.
                arguments "-DSNAP_RHI_BUILD_EXAMPLES=ON",
                          "-DSNAP_RHI_ENABLE_DEBUG_LABELS=ON",
                          "-DSNAP_RHI_ENABLE_LOGS=ON"
            }
        }
    }

    // -------------------------------------------------------------------------
    // Product flavors: select the rendering backend.
    //
    //   Android Studio : Build → Select Build Variant → vulkanDebug / openglDebug
    //   Command line   : ./gradlew assembleVulkanDebug
    //                    ./gradlew assembleOpenglDebug
    // -------------------------------------------------------------------------
    flavorDimensions = ["backend"]

    productFlavors {
        vulkan {
            dimension "backend"
            applicationIdSuffix ".vulkan"
            versionNameSuffix "-vulkan"
            externalNativeBuild {
                cmake {
                    arguments "-DSNAP_RHI_ENABLE_VULKAN=ON",
                              "-DSNAP_RHI_DEMO_APP_API=vulkan"
                }
            }
        }
        opengl {
            dimension "backend"
            applicationIdSuffix ".opengl"
            versionNameSuffix "-opengl"
            externalNativeBuild {
                cmake {
                    arguments "-DSNAP_RHI_ENABLE_OPENGL=ON",
                              "-DSNAP_RHI_DEMO_APP_API=opengl"
                }
            }
        }
    }

    buildTypes {
        debug {
            debuggable true
            jniDebuggable true
            minifyEnabled false
            externalNativeBuild {
                cmake {
                    arguments "-DSNAP_RHI_VULKAN_ENABLE_LAYERS=ON"
                }
            }
        }
        release {
            debuggable false
            jniDebuggable false
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    sourceSets {
        main {
            assets.srcDirs += ['../../../assets']
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }

    externalNativeBuild {
        cmake {
            // Point at the SnapRHI root so the demo app is built as a
            // subdirectory (not standalone), avoiding find_package(snap-rhi).
            path file('../../../../../CMakeLists.txt')
            version "3.25.0+"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    buildFeatures {
        prefab true
    }

    packaging {
        jniLibs {
            keepDebugSymbols += ['**/*.so']
        }
    }
}

// ---------------------------------------------------------------------------
// Vulkan Validation Layers (debug builds only)
//
// Android's Vulkan loader discovers layers from the app's native lib directory.
// This task downloads the pre-built VVL .so from the Khronos GitHub releases
// and places it in jniLibs so it is bundled into debug APKs automatically.
// ---------------------------------------------------------------------------
def vvlVersion = '1.4.309.0'
def vvlDir = file("src/main/jniLibs/arm64-v8a")
def vvlLib = new File(vvlDir, "libVkLayer_khronos_validation.so")

tasks.register('downloadVulkanValidationLayers') {
    description 'Downloads Vulkan Validation Layers .so for Android arm64-v8a debug builds'
    outputs.file(vvlLib)
    onlyIf { !vvlLib.exists() }

    doLast {
        vvlDir.mkdirs()
        def url = "https://github.com/KhronosGroup/Vulkan-ValidationLayers/releases/download/vulkan-sdk-${vvlVersion}/android-binaries-${vvlVersion}.zip"
        def zipFile = new File(buildDir, "vvl-android-${vvlVersion}.zip")

        logger.lifecycle("Downloading Vulkan Validation Layers ${vvlVersion} ...")
        ant.get(src: url, dest: zipFile, skipexisting: false)

        logger.lifecycle("Extracting libVkLayer_khronos_validation.so (arm64-v8a) ...")
        copy {
            from(zipTree(zipFile)) {
                include "**/arm64-v8a/libVkLayer_khronos_validation.so"
                eachFile { it.relativePath = new RelativePath(true, it.name) }
            }
            into vvlDir
        }
        zipFile.delete()
        logger.lifecycle("VVL installed: ${vvlLib}")
    }
}

// Hook into debug builds only — release builds skip VVL download.
// Only gate on mergeJniLibFolders (APK packaging); the native CMake build does
// not need the layer .so, so don't block externalNativeBuild tasks.
tasks.configureEach { task ->
    if (task.name.matches(/merge.*Debug.*JniLibFolders/)) {
        task.dependsOn('downloadVulkanValidationLayers')
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.core:core:1.15.0'

    constraints {
        implementation('org.jetbrains.kotlin:kotlin-stdlib') {
            version { strictly '2.1.0' }
        }
    }
}

configurations.configureEach {
    resolutionStrategy.eachDependency { details ->
        if (details.requested.group == 'org.jetbrains.kotlin' &&
            details.requested.name.startsWith('kotlin-stdlib')) {
            details.useVersion '2.1.0'
        }
    }
}
